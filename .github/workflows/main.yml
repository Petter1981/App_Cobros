name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter pub get
        working-directory: 'app_cobros_umi'
      - run: flutter build apk --release
        working-directory: 'app_cobros_umi'
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: 'app_cobros_umi/build/app/outputs/flutter-apk/app-release.apk'
